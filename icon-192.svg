<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" fill="#0E0E0E"/>
  <!-- Gold border frame -->
  <rect x="8" y="8" width="176" height="176" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
  <!-- Inner glow frame -->
  <rect x="14" y="14" width="164" height="164" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
  <!-- Car silhouette -->
  <g transform="translate(96,100)" fill="#C9A84C">
    <!-- Body -->
    <rect x="-42" y="-14" width="84" height="24" rx="4" fill="#C9A84C" opacity="0.9"/>
    <!-- Roof -->
    <rect x="-28" y="-30" width="50" height="18" rx="5" fill="#C9A84C" opacity="0.7"/>
    <!-- Windshield highlight -->
    <rect x="-24" y="-28" width="20" height="14" rx="3" fill="#0E0E0E" opacity="0.5"/>
    <rect x="0" y="-28" width="20" height="14" rx="3" fill="#0E0E0E" opacity="0.5"/>
    <!-- Wheels -->
    <circle cx="-26" cy="14" r="9" fill="#141414" stroke="#C9A84C" stroke-width="2"/>
    <circle cx="26" cy="14" r="9" fill="#141414" stroke="#C9A84C" stroke-width="2"/>
    <circle cx="-26" cy="14" r="3" fill="#C9A84C" opacity="0.6"/>
    <circle cx="26" cy="14" r="3" fill="#C9A84C" opacity="0.6"/>
  </g>
  <!-- Brand text -->
  <text x="96" y="58" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#C9A84C" text-anchor="middle" letter-spacing="4">ÉLITE</text>
  <text x="96" y="75" font-family="Georgia, serif" font-size="10" fill="#9A9088" text-anchor="middle" letter-spacing="6">RIDES</text>
  <!-- Bottom accent line -->
  <line x1="40" y1="148" x2="152" y2="148" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <!-- Stars -->
  <text x="96" y="165" font-size="11" fill="#C9A84C" text-anchor="middle" opacity="0.6">★ ★ ★ ★ ★</text>
</svg>
